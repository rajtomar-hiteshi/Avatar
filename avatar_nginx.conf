server {
    listen 80;
    server_name 13.126.7.165;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 13.126.7.165;

    ssl_certificate /etc/nginx/ssl/avatar.crt;
    ssl_certificate_key /etc/nginx/ssl/avatar.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 500M;

    # Frontend — no cache so updates show immediately
    location / {
        root /home/ubuntu/Avatar/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Voice pipeline (SSE — no buffering)
    location /voice/ {
        proxy_pass http://127.0.0.1:8000/voice/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        chunked_transfer_encoding on;
        add_header Access-Control-Expose-Headers "X-Transcript, X-Reply";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Admin endpoints (set-pod-url etc)
    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Avatar config + session proxy
    location /avatar/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # RunPod proxy routes (offer/human) — bypasses CORS
    location /proxy/ {
        proxy_pass http://127.0.0.1:8000/proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Session recordings
    location /recordings/ {
        proxy_pass http://127.0.0.1:8000/recordings/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 500M;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # LiveKit token
    location /livekit-token {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
